<head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="vendor.css" />
</head>
<body>

<!-- ── 사이드바 ── -->

    <div class="sidebar-brand">
        <img src="logo.svg" class="sidebar-logo-img" alt="우성디지탈" />
        <span class="sidebar-brand-text">우성디지탈<br>관리 시스템</span>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">&#9998;</span>
            <span>견적 계산기</span>
        </a>
        <a href="estimates.html" class="nav-item">
            <span class="nav-icon">&#128196;</span>
            <span>견적서 관리</span>
        </a>
        <a href="vendor.html" class="nav-item active">
            <span class="nav-icon">&#9679;</span>
            <span>업체 관리</span>
        </a>
        <a href="price.html" class="nav-item">
            <span class="nav-icon">&#128176;</span>
            <span>단가 설정표</span>

            <span class="nav-icon">&#128230;</span>

        <a href="employees.html" class="nav-item">

        <a href="leave.html" class="nav-item">

    </nav>
    <button type="button" class="nav-logout" onclick="wsLogout()">
        <span class="nav-icon">&#9711;</span>
        <span>로그아웃</span>
    </button>
</aside>

<!-- ── 메인 콘텐츠 ── -->
<div class="page-body">

<header class="site-header">
    <div class="header-inner">
        <div class="header-logo">
            <img src="logo.svg" class="logo-img" alt="우성디지탈" />
            <span class="logo-text">우성디지탈 관리 시스템</span>
        </div>
        <p class="header-sub">거래 업체를 등록하고 관리하세요</p>
    </div>
</header>

<div class="vendor-wrap">

    <!-- 업체 목록 -->
    <div class="vendor-card">
        <div class="vendor-card-title">
            <span class="title-bar"></span>
            등록된 업체 목록
            <span class="vendor-count" id="vendor_count">0개</span>
            <button type="button" id="btn_add_vendor" class="btn-submit vendor-add-btn">+ 업체 등록</button>
        </div>

        <!-- 검색 영역 -->
        <div class="vendor-search">
            <input type="text" id="vs_name"  class="vs-input" placeholder="업체명" />
            <input type="text" id="vs_owner" class="vs-input" placeholder="대표자명" />
            <input type="text" id="vs_phone" class="vs-input" placeholder="연락처" />
            <input type="text" id="vs_email" class="vs-input" placeholder="이메일" />
            <button type="button" id="btn_vs_reset" class="vs-reset-btn">초기화</button>
        </div>

        <div id="vendor_list_area">
            <p class="vendor-empty">등록된 업체가 없습니다.</p>
        </div>
    </div>

</div>
</div><!-- /page-body -->

<!-- ── 업체 등록/수정 모달 ── -->
<div class="modal_overlay" id="vendor_form_modal">
    <div class="modal_box">
        <div class="modal_header">
            <h3 id="form_title_text">업체 등록</h3>
            <button type="button" class="modal_close" id="vendor_modal_close">&#215;</button>
        </div>
        <div class="modal_body">
            <form id="vendor_form" autocomplete="off">
                <div class="vendor-form-grid">
                    <div class="form-field required">
                        <label for="v_name">업체명</label>
                        <input type="text" id="v_name" placeholder="업체명을 입력하세요" />
                    </div>
                    <div class="form-field">
                        <label for="v_owner">대표자명</label>
                        <input type="text" id="v_owner" placeholder="대표자 이름" />
                    </div>
                    <div class="form-field">
                        <label for="v_phone">연락처</label>
                        <input type="text" id="v_phone" placeholder="010-0000-0000" />
                    </div>
                    <div class="form-field">
                        <label for="v_email">이메일</label>
                        <input type="text" id="v_email" placeholder="example@email.com" />
                    </div>
                    <div class="form-field full">
                        <label for="v_address">주소</label>
                        <input type="text" id="v_address" placeholder="업체 주소" />
                    </div>
                    <div class="form-field full">
                        <label for="v_memo">메모</label>
                        <textarea id="v_memo" rows="3" placeholder="특이사항 또는 메모"></textarea>
                    </div>
                </div>
                <p id="form_error" class="form-error"></p>
            </form>
        </div>
        <div class="modal_footer">
            <button type="button" id="btn_cancel_edit" class="modal_cancel_btn">취소</button>
            <button type="submit" form="vendor_form" id="btn_submit" class="modal_save_btn">&#10003; 등록하기</button>
        </div>
    </div>
</div>

<!-- ── 업체별 견적 목록 모달 ── -->
<div class="modal_overlay" id="vendor_est_modal">
    <div class="modal_box vest-modal-box">
        <div class="modal_header">
            <h3 id="vest_title">견적 목록</h3>
            <button type="button" class="modal_close" id="vest_modal_close">&#215;</button>
        </div>
        <div class="modal_body" id="vest_body"></div>
        <div class="modal_footer">
            <button type="button" class="modal_cancel_btn" id="vest_close_btn">닫기</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="auth.js"></script>
<script src="vendor.js"></script>
</body>
</html>
