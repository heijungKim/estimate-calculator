        <div class="emp-info-item">

    <!-- 직원 목록 카드 -->

            <button type="button" id="btn_add_emp" class="btn-emp-add">+ 직원 등록</button>
        </div>
        <div id="emp_list_area">

        </div>
    </div>

</div>

<!-- ── 직원 등록/수정 모달 ── -->
<div class="modal_overlay" id="emp_form_modal">
    <div class="modal_box">
        <div class="modal_header">
            <h3 id="emp_form_title">직원 등록</h3>
            <button type="button" class="modal_close" id="emp_modal_close">&#215;</button>
        </div>
        <div class="modal_body">
            <div class="emp-form-grid">
                <div class="form-field required">
                    <label for="emp_name">이름</label>
                    <input type="text" id="emp_name" placeholder="홍길동" />
                </div>
                <div class="form-field">
                    <label for="emp_user_id">사용자 아이디 <span class="modal_opt">(선택)</span></label>
                    <input type="text" id="emp_user_id" placeholder="예: hong123" />
                </div>
                <div class="form-field">
                    <label for="emp_rank">직급</label>
                    <input type="text" id="emp_rank" placeholder="예: 사원, 대리, 과장" />
                </div>
                <div class="form-field">
                    <label for="emp_position">포지션</label>
                    <input type="text" id="emp_position" placeholder="예: 디자이너, 시공팀" />
                </div>
                <div class="form-field">
                    <label for="emp_phone">연락처</label>
                    <input type="text" id="emp_phone" placeholder="010-0000-0000" />
                </div>
                <div class="form-field">
                    <label for="emp_join_date">입사일</label>
                    <input type="date" id="emp_join_date" />
                </div>
                <div class="form-field">
                    <label for="emp_salary">연봉 (원)</label>
                    <input type="number" id="emp_salary" placeholder="예: 30000000" min="0" />
                </div>
                <div class="form-field">
                    <label for="emp_work_hours">일 근무시간 (시간)</label>
                    <input type="number" id="emp_work_hours" placeholder="예: 8" min="1" max="24" step="0.5" />
                </div>
                <div class="form-field full">
                    <label for="emp_memo">메모 <span class="modal_opt">(선택)</span></label>
                    <textarea id="emp_memo" rows="2" placeholder="특이사항 등"></textarea>
                </div>
            </div>
            <p class="emp-form-error" id="emp_form_error"></p>
        </div>
        <div class="modal_footer">
            <button id="emp_form_cancel" class="modal_cancel_btn">취소</button>
            <button id="emp_form_save" class="modal_save_btn">저장하기</button>
        </div>
    </div>
</div>
