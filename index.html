<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "//www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="//www.w3.org/1999/xhtml" xml:lang="ko" lang="ko">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Pragma" content="no-cache" />

    <title>간판 견적 계산기</title>

    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body id="main">

<!-- ── 사이드바 ── -->
<aside class="sidebar">
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">&#9998;</span>
            <span>견적 계산기</span>
        </a>
        <a href="vendor.html" class="nav-item">
            <span class="nav-icon">&#9679;</span>
            <span>업체 관리</span>
        </a>
        <a href="price.html" class="nav-item">
            <span class="nav-icon">&#128176;</span>
            <span>단가 설정표</span>
        </a>
    </nav>
</aside>

<!-- ── 메인 콘텐츠 ── -->
<div class="page-body">

<div id="top_total_info"></div>

<header class="site-header">
    <div class="header-inner">
        <div class="header-logo">
            <span class="logo-icon">&#9632;</span>
            <span class="logo-text">간판 견적 계산기</span>
        </div>
        <p class="header-sub">원하는 간판 종류를 선택하고 옵션을 설정하세요</p>
    </div>
</header>

<div class="woosung_wrap">


    <div class="tab_area">
        <ul>
            <li class="child01">
                <span class="tab-icon">&#9670;</span>
                <span class="tab-label">사인탑</span>
            </li>
            <li class="child02">
                <span class="tab-icon">&#9670;</span>
                <span class="tab-label">채널문자</span>
            </li>
            <li class="child04">
                <span class="tab-icon">&#9670;</span>
                <span class="tab-label">실사출력</span>
            </li>
            <li class="child05">
                <span class="tab-icon">&#9670;</span>
                <span class="tab-label">스카시</span>
            </li>
        </ul>
    </div>

    <div class="contents_wrap">
        <div class="table-wrapper">
            <table id="option_table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="order_info">
            <div class="order_info_inner">
                <span class="left_area">현재 견적 비용</span>
                <span class="right_area">
                    <span id="order_price">0</span>
                    <span class="unit">원</span>
                    <div id="detail_list"></div>
                </span>
            </div>
        </div>

        <div class="btn_area">
            <a href="#none" class="save_btn">
                <span class="btn-icon">+</span>
                견적 목록에 추가
            </a>
            <div id="save_error_msg"></div>
        </div>

        <div id="total_price_wrap">
            <div class="total_list">
                <h2 class="total_title">
                    <span class="title-bar"></span>
                    추가된 견적 리스트
                </h2>
                <ul></ul>
            </div>
            <div class="price_info">
                <div class="price_info_inner">
                    <div class="left_area">총 견적 비용</div>
                    <div class="right_area"><span class="price">0</span><span class="unit">원</span></div>
                </div>
            </div>
            <div class="estimate_actions">
                <button id="btn_clear_list" class="est_clear_btn">목록 초기화</button>
                <button id="btn_save_estimate" class="est_save_btn">&#128190; 견적 저장</button>
                <button id="btn_print_estimate" class="est_print_btn">&#128424; 견적서 출력</button>
            </div>
        </div>

        <!-- 저장된 견적 목록 -->
        <div class="archive_section" id="archive_section">
            <h2 class="total_title">
                <span class="title-bar"></span>
                저장된 견적 목록
            </h2>
            <!-- 검색/필터 -->
            <div class="archive_search" id="archive_search">
                <!-- 1행: 텍스트·상태·진행여부 -->
                <div class="arc_search_row">
                    <input type="text" id="search_name"    class="arc_search_input" placeholder="견적서 이름 검색..." />
                    <input type="text" id="search_company" class="arc_search_input" placeholder="업체명 검색..." />
                    <select id="search_status" class="arc_search_select">
                        <option value="">전체 상태</option>
                        <option value="대기">대기</option>
                        <option value="미납">미납</option>
                        <option value="부분 납부">부분 납부</option>
                        <option value="완납">완납</option>
                    </select>
                    <select id="search_proceed" class="arc_search_select">
                        <option value="">진행 여부 전체</option>
                        <option value="O">O (진행)</option>
                        <option value="X">X (미진행)</option>
                    </select>
                    <button id="btn_search_reset" class="arc_search_reset">초기화</button>
                </div>
                <!-- 2행: 기간 검색 -->
                <div class="arc_search_row arc_date_row">
                    <span class="arc_date_label">기간</span>
                    <input type="date" id="search_date_from" class="arc_search_input arc_date_input" />
                    <span class="arc_date_sep">~</span>
                    <input type="date" id="search_date_to"   class="arc_search_input arc_date_input" />
                    <div class="arc_date_quick_btns">
                        <button class="arc_date_quick" data-range="today">당일</button>
                        <button class="arc_date_quick" data-range="yesterday">전일</button>
                        <button class="arc_date_quick" data-range="thismonth">당월</button>
                        <button class="arc_date_quick" data-range="lastmonth">전월</button>
                    </div>
                </div>
            </div>
            <div class="archive_list" id="archive_list">
                <p class="archive_empty">저장된 견적이 없습니다.</p>
            </div>
        </div>
    </div>
</div>

</div><!-- /page-body -->

<!-- 견적 저장 모달 -->
<div class="modal_overlay" id="save_name_modal">
    <div class="modal_box">
        <div class="modal_header">
            <h3>견적 저장</h3>
            <button class="modal_close" id="save_name_close">&#215;</button>
        </div>
        <div class="modal_body">
            <div class="modal_field">
                <label for="save_estimate_company">업체명</label>
                <select id="save_estimate_company">
                    <option value="">-- 업체 선택 (선택 안 함) --</option>
                </select>
            </div>
            <div class="modal_field">
                <label for="save_estimate_name">견적 이름</label>
                <input type="text" id="save_estimate_name" placeholder="예: 홍길동 채널문자 견적" />
            </div>
            <div class="modal_field">
                <label>저장 날짜</label>
                <input type="text" id="save_estimate_date" readonly />
            </div>
        </div>
        <div class="modal_footer">
            <button id="save_name_cancel" class="modal_cancel_btn">취소</button>
            <button id="save_name_confirm" class="modal_save_btn">저장하기</button>
        </div>
    </div>
</div>

<!-- 견적 내역 보기 모달 -->
<div class="modal_overlay" id="archive_detail_modal">
    <div class="modal_box modal_lg">
        <div class="modal_header">
            <div class="modal_header_info">
                <h3 id="detail_modal_title"></h3>
                <p id="detail_modal_date" class="detail_modal_date"></p>
            </div>
            <button class="modal_close" id="detail_modal_close">&#215;</button>
        </div>
        <div class="modal_body modal_body_scroll">
            <ul id="detail_items_list" class="detail_items_list"></ul>
            <div class="detail_total_row">
                <span class="detail_total_label">합 계</span>
                <span class="detail_total_val">&#8361; <em id="detail_total_num">0</em> 원</span>
            </div>
        </div>
        <!-- 결제 정보 -->
        <div class="detail_payment_section">
            <div class="detail_payment_field">
                <span class="detail_payment_label">진행 여부</span>
                <div class="detail_proceed_btns">
                    <button class="btn_proceed" data-val="O">O</button>
                    <button class="btn_proceed" data-val="X">X</button>
                </div>
            </div>
            <div id="detail_payment_fields" class="detail_payment_fields payment_disabled">
                <div class="detail_payment_field">
                    <span class="detail_payment_label">견적 상태</span>
                    <select id="detail_status_sel" class="arc_status_sel st_wait">
                        <option value="대기">대기</option>
                        <option value="미납">미납</option>
                        <option value="부분 납부">부분 납부</option>
                        <option value="완납">완납</option>
                    </select>
                </div>
                <div class="detail_payment_field">
                    <span class="detail_payment_label">입금 금액</span>
                    <div class="detail_paid_row">
                        <span class="detail_paid_currency">&#8361;</span>
                        <input type="text" id="detail_paid_input" class="detail_paid_input" placeholder="0" />
                        <label class="detail_paid_full_label">
                            <input type="checkbox" id="detail_paid_full_chk" />
                            <span>완납</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal_footer">
            <button id="detail_load_btn" class="detail_load_btn">현재 목록으로 불러오기</button>
            <button id="detail_print_btn" class="modal_print_btn">견적서 출력</button>
        </div>
    </div>
</div>

<!-- 견적서 출력 모달 -->
<div class="modal_overlay" id="print_modal">
    <div class="modal_box">
        <div class="modal_header">
            <h3>견적서 출력</h3>
            <button class="modal_close" id="modal_close">&#215;</button>
        </div>
        <div class="modal_body">
            <div class="modal_field">
                <label for="print_customer">수신 (업체 / 고객명)</label>
                <input type="text" id="print_customer" placeholder="예: 홍길동 / (주)ABC" />
            </div>
            <div class="modal_field">
                <label for="print_manager">담당자 <span class="modal_opt">(선택)</span></label>
                <input type="text" id="print_manager" placeholder="담당자 이름" />
            </div>
            <div class="modal_field">
                <label for="print_notes">비고 <span class="modal_opt">(선택)</span></label>
                <textarea id="print_notes" rows="3" placeholder="특이사항 또는 기타 메모"></textarea>
            </div>
        </div>
        <div class="modal_footer">
            <button id="modal_cancel" class="modal_cancel_btn">취소</button>
            <button id="modal_confirm_print" class="modal_print_btn">출력하기</button>
        </div>
    </div>
</div>

<!-- Firebase SDK (견적 클라우드 저장) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="index.js"></script>
</body>
</html>
