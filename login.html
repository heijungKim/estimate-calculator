<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 - 간판 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 48px 44px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .login-logo-icon {
            color: #e94560;
            font-size: 22px;
        }
        .login-logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        .login-sub {
            font-size: 13px;
            color: #8892a4;
            margin-bottom: 36px;
            padding-left: 32px;
        }

        .login-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 16px;
        }
        .login-field label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }
        .login-field input {
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a2e;
            background: #fafbfc;
            outline: none;
            transition: border-color 0.18s;
        }
        .login-field input:focus {
            border-color: #e94560;
            background: #fff;
        }

        .auto-login-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
            margin-top: 4px;
        }
        .auto-login-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #e94560;
            cursor: pointer;
        }
        .auto-login-row label {
            font-size: 13px;
            color: #4a5568;
            cursor: pointer;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.18s;
        }
        .login-btn:hover { opacity: 0.88; }

        .login-error {
            font-size: 12px;
            color: #e94560;
            min-height: 18px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <span class="login-logo-icon">&#9632;</span>
            <span class="login-logo-text">간판 관리</span>
        </div>
        <p class="login-sub">견적 계산기 &amp; 업체 관리 시스템</p>

        <form id="login_form" autocomplete="off">
            <div class="login-field">
                <label for="login_id">아이디</label>
                <input type="text" id="login_id" placeholder="아이디를 입력하세요" autocomplete="username" />
            </div>
            <div class="login-field">
                <label for="login_pw">비밀번호</label>
                <input type="password" id="login_pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />
            </div>

            <div class="auto-login-row">
                <input type="checkbox" id="auto_login" checked />
                <label for="auto_login">자동 로그인</label>
            </div>

            <button type="submit" class="login-btn">로그인</button>
            <p class="login-error" id="login_error"></p>
        </form>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
